<!DOCTYPE html>

<html lang="en">

<head>

    <!--
        Allows the webpage to display text and symbols correctly.
    -->
    <meta charset="UTF-8">

    <!--
        Helps the webpage resize properly on phones and tablets.
    -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!--
        This appears in the browser tab.
    -->
    <title>Contact Information</title>

</head>

<body>

    <!--
        This is the main heading for the page.
    -->
    <h1>Contact Information</h1>

    <!--
        Each <section> groups one person's contact information.
    -->
    <section>

        <!-- Replace this with your name -->
        <h2>Gaven Jesse</h2>

        <!--
            The mailto: value makes the email address clickable.
            Replace the example email with your real email.
        -->
        <p>
            Email:
            <a href="mailto:gaven@example.com">
                gaven@example.com
            </a>
        </p>

        <!--
            The tel: value makes the phone number clickable,
            especially on mobile devices.
        -->
        <p>
            Phone:
            <a href="tel:+14255551234">
                425-555-1234
            </a>
        </p>

    </section>

    <hr>

    <section>

        <!-- Replace this with your first friend's name -->
        <h2>Friend One</h2>

        <p>
            Email:
            <a href="mailto:friendone@example.com">
                friendone@example.com
            </a>
        </p>

        <p>
            Phone:
            <a href="tel:+14255555678">
                425-555-5678
            </a>
        </p>

    </section>

    <hr>

    <section>

        <!-- Replace this with your second friend's name -->
        <h2>Friend Two</h2>

        <p>
            Email:
            <a href="mailto:friendtwo@example.com">
                friendtwo@example.com
            </a>
        </p>

        <p>
            Phone:
            <a href="tel:+14255559012">
                425-555-9012
            </a>
        </p>

    </section>

    <!--
        ../ means "go up one folder."

        Contacts.html is inside the pages folder,
        so this link returns to Practice Webpage.html.
    -->
    <p>
        <a href="../Practice Webpage.html">
            Return to Main Page
        </a>
    </p>

</body>

</html>
